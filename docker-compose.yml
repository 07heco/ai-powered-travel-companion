# =====================================================
# AI-Powered Travel Companion Docker Compose 配置
# =====================================================
# 快速启动开发环境所需的基础设施服务
# =====================================================

version: '3.8'

services:

  # ==================================================
  # MySQL 数据库
  # ==================================================
  mysql:
    image: mysql:8.0
    container_name: travel-companion-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: travel_companion
      MYSQL_USER: travel
      MYSQL_PASSWORD: travel123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./create_database.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-network
    restart: unless-stopped

  # ==================================================
  # Redis 缓存
  # ==================================================
  redis:
    image: redis:7.0-alpine
    container_name: travel-companion-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-network
    restart: unless-stopped

  # ==================================================
  # Nacos 服务注册与配置中心
  # ==================================================
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: travel-companion-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: travel
      MYSQL_SERVICE_PASSWORD: travel123456
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - travel-network
    restart: unless-stopped

  # ==================================================
  # Nginx - 前端静态文件服务 (可选)
  # ==================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: travel-companion-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./frontend/dist:/usr/share/nginx/html
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #   networks:
  #     - travel-network
  #   restart: unless-stopped

# ==================================================
# 数据卷
# ==================================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  nacos-data:
    driver: local

# ==================================================
# 网络
# ==================================================
networks:
  travel-network:
    driver: bridge
