server:
  port: 8080

spring:
  sql:
    init:
      mode: never
  dao:
    exceptiontranslation:
      enabled: false
  application:
    name: gateway-service

  # Redis配置
  redis:
    host: 106.53.210.60
    port: 6379
    password: 123456
    database: 0

  # Nacos配置
  cloud:
    nacos:
      discovery:
        server-addr: 106.53.210.60:8848
        namespace: public
      config:
        server-addr: 106.53.210.60:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
        import-check:
          enabled: false

    # Gateway配置
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: destination-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/destination/**
          filters:
            - StripPrefix=1
        - id: trip-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/trip/**
          filters:
            - StripPrefix=1
        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/booking/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=1
        - id: ai-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1
        - id: message-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/message/**
          filters:
            - StripPrefix=1
        - id: wallet-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/wallet/**
          filters:
            - StripPrefix=1
        - id: deals-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/deals/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: debug
